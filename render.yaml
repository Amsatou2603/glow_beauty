services:
  - type: web
    name: glow_beauty
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput --clear --ignore=node_modules && python manage.py create_admin && python load_production_data.py"
    startCommand: "cd backend && gunicorn glow_beauty.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: glow-beauty-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://glowbeautyyy.netlify.app,https://glow-beauty-plum.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://glowbeautyyy.netlify.app,https://glow-beauty-plum.vercel.app
      - key: ADMIN_EMAIL
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true

databases:
  - name: glow-beauty-db
    databaseName: glow_beauty
    user: glow_beauty_user
